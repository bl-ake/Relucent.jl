name: Sync version with upstream relucent

on:
  repository_dispatch:
    types: [relucent-released]
  schedule:
    - cron: '0 6 * * *'  # Daily fallback at 06:00 UTC
  workflow_dispatch:

jobs:
  sync-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get upstream relucent version from PyPI
        id: upstream
        run: |
          VERSION=$(curl -fsSL https://pypi.org/pypi/relucent/json \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get current Relucent.jl version
        id: current
        run: |
          VERSION=$(grep '^version' Project.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump Project.toml and push
        if: steps.upstream.outputs.version != steps.current.outputs.version
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.upstream.outputs.version }}"/' Project.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Project.toml
          git commit -m "Bump version to ${{ steps.upstream.outputs.version }} (mirrors upstream relucent)"
          git push
